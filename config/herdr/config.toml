# herdr configuration — vim bindings, bamboo palette, ctrl+space prefix
# Hot-reload with: herdr server reload-config

onboarding = false

[theme]
# Tokyo Night — swapped from "terminal" (ghostty ANSI passthrough) 2026-07-03
name = "tokyo-night"

[theme.custom]
# Transparent panels so ghostty's #0d120d + 0.96 opacity shows through
panel_bg = "reset"
# Inactive/secondary rows (subtext0/overlay0/overlay1) left at theme defaults —
# no more dimming; everything reads at full strength.
# Selected/active row highlight bar. Verified by screenshot diagnostic: THIS slot
# paints the sidebar selection bar (and section dividers) — not surface0/1 (tab
# backgrounds). NOTE: herdr renders the row's normal multi-colored LIGHT text
# (name white, state label orange/green/blue) on the selected row and exposes no
# working font-color override (`selected_text` is silently ignored). So the bar
# must stay DARK for that light text to read. Dark indigo: clearly elevated from
# the near-black panel, still legible. `herdr server reload-config` after edits.
surface_dim = "#34406b"

[keys]
# Same prefix as tmux (C-Space muscle memory).
prefix = "ctrl+space"

# Keybinding help popup — H for Help. (Default is prefix+? ; shift+h keeps hjkl
# pane focus intact since bare prefix+h is focus_pane_left.) Auto-reflects config.
help = "prefix+shift+h"

# Workspace navigation — vim J/K walks the sidebar; prefix+1..9 jumps to a space
# direct (Cmd+1..9 via ghostty). Spaces own the PLAIN number row; tabs get the
# shifted row (switch_tab below), so Cmd+1..9 switches spaces, not tabs.
next_workspace = "prefix+shift+j"
previous_workspace = "prefix+shift+k"
switch_workspace = "prefix+1..9"

# Tabs moved off the plain number row (now spaces) onto shifted digits. Reachable
# by pressing the prefix then shift+number; next/previous tab stay on prefix+n/p.
switch_tab = "prefix+shift+1..9"

# Agent cycling — a / A steps through the agent panel
next_agent = "prefix+a"
previous_agent = "prefix+shift+a"

# Pane back-and-forth (hjkl focus + v/minus splits are the built-in defaults)
last_pane = "prefix+backtick"

# Worktree flow — new (shift+g) is default; add open + remove
open_worktree = "prefix+shift+o"
remove_worktree = "prefix+shift+e"

# Insta agent-switch — bare ctrl+1..9 jumps straight to an agent row, no prefix,
# no typing, no goto-navigator "/" step. With agent_panel_sort = "priority"
# (below) row 1 is always the agent most needing attention, row 2 the next, etc.
# ctrl (not alt) so no macOS option-as-alt hack is needed.
[keys.indexed]
agents = "ctrl"

# lazygit in a throwaway pane
[[keys.command]]
key = "prefix+shift+l"
type = "pane"
command = "lazygit"

# Live ticking clock in a throwaway pane (prefix+shift+c). Pure-bash block-digit
# clock — the statusline clock only refreshes on activity, so the real-time one
# lives here. q or ctrl+c to close; herdr disposes the pane on exit.
[[keys.command]]
key = "prefix+shift+c"
type = "pane"
command = "/Users/OWNER/.config/herdr/scripts/clock.sh"

# Scrollback in floating nvim (editable/yankable) — clone of tmux `prefix v`.
# Captures the source pane's ansi scrollback, opens it in nvim with baleia
# colorizing, q to quit, G to bottom. prefix+shift+v (prefix+v is split-vertical).
[[keys.command]]
key = "prefix+shift+v"
type = "pane"
command = "/Users/OWNER/.config/herdr/scripts/scrollback-nvim.sh"

[ui]
# Focus accent — Tokyo Night green so the focused pane border + active row pop
accent = "#9ece6a"
# Attention queue on top instead of grouping by space
agent_panel_sort = "priority"
# Label split panes with the detected agent
show_agent_labels_on_pane_borders = true
# Instant tabs; rename later with prefix+shift+t
prompt_new_tab_name = false

[ui.toast]
# Background agents ping macOS notifications directly
delivery = "system"

[experimental]
# Keep pane screen history across full server restarts
pane_history = true
